services:
  - type: web
    name: dsa-private
    runtime: docker
    plan: free
    region: singapore
    branch: main
    dockerfilePath: docker/Dockerfile
    dockerContext: .
    dockerCommand: python -m uvicorn server:app --host 0.0.0.0 --port 8000 --proxy-headers
    healthCheckPath: /api/v1/health
    autoDeployTrigger: commit
    envVars:
      - key: TZ
        value: Asia/Shanghai
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: WEBUI_HOST
        value: 0.0.0.0
      - key: WEBUI_PORT
        value: "8000"
      - key: API_PORT
        value: "8000"
      - key: PORT
        value: "8000"
      - key: WEBUI_AUTO_BUILD
        value: "false"
      - key: WEBUI_STARTUP_TIMEOUT_SECONDS
        value: "180"
      - key: ADMIN_AUTH_ENABLED
        value: "true"
      - key: ADMIN_SESSION_MAX_AGE_HOURS
        value: "24"
      - key: LOG_DIR
        value: /app/logs
      - key: CORS_ALLOW_ALL
        value: "false"
      - key: TRUST_X_FORWARDED_FOR
        value: "true"
      - key: STOCK_LIST
        value: 000725,515880,515050,601138,300502,159732
      - key: REPORT_LANGUAGE
        value: zh
      - key: SCHEDULE_ENABLED
        value: "false"
      - key: MAX_WORKERS
        value: "1"
      - key: RENDER_ANALYSIS_LIGHT_MODE
        value: "true"
      - key: LIGHT_ANALYSIS_QUOTE_TIMEOUT
        value: "5"
      - key: EFINANCE_CALL_TIMEOUT
        value: "8"
      - key: EFINANCE_MAX_CONCURRENT_CALLS
        value: "1"
      - key: NEWS_INTEL_FETCH_TIMEOUT_SEC
        value: "4"
      - key: NEWS_INTEL_MAX_ITEMS_PER_SOURCE
        value: "10"
      - key: FUNDAMENTAL_STAGE_TIMEOUT_SECONDS
        value: "8"
      - key: FUNDAMENTAL_FETCH_TIMEOUT_SECONDS
        value: "2"
      - key: SEARXNG_PUBLIC_INSTANCES_ENABLED
        value: "false"
